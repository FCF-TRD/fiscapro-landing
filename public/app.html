window.logRelance=(num)=>{

  relances.push({date:today(),note});

};

window.saveDevis=()=>{
  const lines=[];

// ============ V3: PRÉVISIONNEL 12 MOIS ============
function renderPrevisionnel(el){
  const c=compute();const t=c.t;
  const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const now=new Date().getMonth();
  const fExo=facturesExo();const dExo=depensesExo();
  const caM=months.map((_,i)=>fExo.filter(f=>new Date(f.date).getMonth()===i).reduce((s,f)=>s+(f.ht||0),0));
  const depM=months.map((_,i)=>dExo.filter(d=>new Date(d.date).getMonth()===i).reduce((s,d)=>s+(d.ht||0),0));
  // Prévision: moyenne des mois passés pour les mois futurs
  const pastCA=caM.filter((_,i)=>i<=now&&caM[i]>0);const avgCA=pastCA.length?pastCA.reduce((a,b)=>a+b,0)/pastCA.length:0;
  const pastDep=depM.filter((_,i)=>i<=now&&depM[i]>0);const avgDep=pastDep.length?pastDep.reduce((a,b)=>a+b,0)/pastDep.length:0;
  const prevCA=months.map((_,i)=>i<=now?caM[i]:(avgCA));
  const prevDep=months.map((_,i)=>i<=now?depM[i]:(avgDep));
  const remM=(company.rem||0)*(1+t.cp);
  let cumTreso=0;const tresoM=months.map((_,i)=>{cumTreso+=prevCA[i]-prevDep[i]-remM;return cumTreso;});
  const caAn=prevCA.reduce((a,b)=>a+b,0);const depAn=prevDep.reduce((a,b)=>a+b,0);

  el.innerHTML=`
  <div class="top"><div><h2>📈 Prévisionnel 12 mois</h2><div class="top-s">Projection basée sur la moyenne des mois écoulés</div></div></div>
  <div class="gr g4 kpi-grid">
    <div class="cd kpi"><div class="kpi-v" style="color:var(--grn)">${fmt(caAn)}</div><div class="kpi-l">CA prév. annuel</div></div>
    <div class="cd kpi"><div class="kpi-v" style="color:var(--red)">${fmt(depAn+remM*12)}</div><div class="kpi-l">Charges prév.</div></div>
    <div class="cd kpi"><div class="kpi-v" style="color:${tresoM[11]>=0?'var(--cya)':'var(--red)'}">${fmt(tresoM[11])}</div><div class="kpi-l">Tréso. fin d'année</div></div>
    <div class="cd kpi"><div class="kpi-v" style="color:var(--pur)">${caAn>0?fmtP((caAn-depAn-remM*12)/caAn):'–'}</div><div class="kpi-l">Marge prév.</div></div>
  </div>
  <div class="cd"><div class="cd-t">Évolution prévisionnelle</div><canvas id="chPrev"></canvas></div>
  <div class="cd"><div class="cd-t">Détail mensuel</div>
  <!-- Desktop: all 12 months -->
  <div class="desk-only tbl-wrap"><table><thead><tr><th>Mois</th><th style="text-align:right">CA</th><th style="text-align:right">Dép.</th><th style="text-align:right">Charges</th><th style="text-align:right">Résultat</th><th style="text-align:right">Tréso.</th></tr></thead><tbody>
  ${months.map((m,i)=>{const res=prevCA[i]-prevDep[i]-remM;return`<tr${i>now?' style="opacity:.6"':''}>
    <td style="font-weight:600;white-space:nowrap">${m}${i>now?' *':''}</td><td style="text-align:right;white-space:nowrap">${fmt(prevCA[i])}</td><td style="text-align:right;white-space:nowrap">${fmt(prevDep[i])}</td><td style="text-align:right;white-space:nowrap">${fmt(remM)}</td>
    <td style="text-align:right;font-weight:700;white-space:nowrap;color:${res>=0?'var(--grn)':'var(--red)'}">${fmt(res)}</td>
    <td style="text-align:right;font-weight:700;white-space:nowrap;color:${tresoM[i]>=0?'var(--cya)':'var(--red)'}">${fmt(tresoM[i])}</td>
    </tr>`;}).join('')}
  </tbody></table></div>
  <!-- Mobile: compact cards by trimestre -->
  <div class="mob-only" style="display:none">
  ${[{l:'T1',m:[0,1,2]},{l:'T2',m:[3,4,5]},{l:'T3',m:[6,7,8]},{l:'T4',m:[9,10,11]}].map(q=>{
    const qCA=q.m.reduce((s,i)=>s+prevCA[i],0);const qDep=q.m.reduce((s,i)=>s+prevDep[i],0);const qRes=qCA-qDep-remM*3;const future=q.m[0]>now;
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--brd);${future?'opacity:.6':''}">
      <div><div style="font-size:13px;font-weight:700">${q.l}${future?' *':''}</div>
      <div style="font-size:10px;color:var(--tx3)">CA <span style="color:var(--grn)">${fmt(qCA)}</span> — Dép. <span style="color:var(--red)">${fmt(qDep)}</span></div></div>
      <div style="font-size:16px;font-weight:800;color:${qRes>=0?'var(--grn)':'var(--red)'}">${fmt(qRes)}</div>
    </div>`;}).join('')}
  </div>
  <p style="font-size:10px;color:var(--tx3);margin-top:8px">* Estimé sur la moyenne des mois passés</p></div>
  ${c.ca>FISCAL_ALERT_TVA?`<div class="al al-w">⚠️ CA en approche du seuil de franchise TVA (${fmt(37500)}). Anticipez le passage au réel.</div>`:''}
  ${tresoM.some(t=>t<0)?`<div class="al al-w">⚠️ Trésorerie négative prévisionnelle détectée. Anticipez un financement.</div>`:''}`;
  setTimeout(()=>{
    const cv=$('#chPrev');if(!cv)return;
    if(charts.prev)charts.prev.destroy();
    const mob=window.innerWidth<600;
    charts.prev=new Chart(cv,{type:'bar',data:{labels:months.map(m=>m.substring(0,3)),datasets:[
      {label:'CA',data:prevCA,backgroundColor:months.map((_,i)=>i>now?'rgba(99,102,241,.25)':'rgba(99,102,241,.5)'),borderRadius:4,barPercentage:.7},
      {label:'Dép.+Charges',data:months.map((_,i)=>prevDep[i]+remM),backgroundColor:months.map((_,i)=>i>now?'rgba(239,68,68,.15)':'rgba(239,68,68,.35)'),borderRadius:4,barPercentage:.7},
      {type:'line',label:'Tréso.',data:tresoM,borderColor:'#06b6d4',backgroundColor:'transparent',tension:.4,pointRadius:mob?2:3,borderWidth:2}
    ]},options:{responsive:true,maintainAspectRatio:true,aspectRatio:mob?1.8:2.5,plugins:{legend:{labels:{color:'#94a3b8',font:{size:mob?8:10},boxWidth:mob?8:12}}},scales:{x:{ticks:{color:'#64748b',font:{size:mob?7:9},maxRotation:0},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:mob?7:9},maxTicksLimit:4},grid:{color:'rgba(37,41,56,.3)'}}}}});
  },50);
}

function docHeader(title,subtitle,showRib){
  const t=TYPES[company?.type]||TYPES.SAS;const d=new Date().toLocaleDateString('fr-FR');
  const logo=company.logo?'<img src="'+company.logo+'" style="max-width:80px;max-height:60px;object-fit:contain;margin-right:14px">':'';
  const contact=[(company.tel||''),(company.email||''),(company.site||'')].filter(Boolean).join(' | ');
  let h='<div class="doc-header"><div class="left" style="display:flex;align-items:center">'+logo+'<div><h1>'+title+'</h1><div class="subtitle">'+subtitle+' — Edite le '+d+'</div></div></div>'
  +'<div class="right"><div class="company-name">'+(company.nom||'')+'</div>'+(t.f)+'<br>'+(company.adresse||'')+'<br>SIREN: '+(company.siren||'')
  +(contact?'<br><span style="font-size:11px;color:#6B7280">'+contact+'</span>':'')
  +'</div></div>';
  if(showRib&&(company.iban||company.bic)){
    h+='<div style="margin-top:12px;padding:10px 14px;background:#F0F5F2;border:1px solid #D1DDD6;border-radius:6px;font-size:11px;display:flex;gap:20px;flex-wrap:wrap">'
    +'<div><b>Coordonnees bancaires</b></div>'
    +(company.banque?'<div>Banque: <b>'+company.banque+'</b></div>':'')
    +(company.iban?'<div>IBAN: <b style="font-family:monospace;letter-spacing:1px">'+company.iban+'</b></div>':'')
    +(company.bic?'<div>BIC: <b style="font-family:monospace">'+company.bic+'</b></div>':'')
    +'</div>';
  }
  return h;
}

// ============ COMPARAISON N vs N-1 ============
function renderComparaison(){
  const exos=getExercices();
  if(exos.length<2)return'';
  const prevYear=currentExercice-1;
  if(!exos.includes(prevYear))return'';

  // Compute N
  const cN=compute();
  // Compute N-1
  const savedExo=currentExercice;
  currentExercice=prevYear;
  const cN1=compute();
  currentExercice=savedExo;

  const compare=(label,vN,vN1)=>{
    const diff=vN-vN1;const pct=vN1!==0?((diff/Math.abs(vN1))*100).toFixed(1):vN>0?'100':'0';
    const up=diff>0;const color=label.includes('Dep')||label.includes('IS')?(up?'var(--red)':'var(--grn)'):(up?'var(--grn)':'var(--red)');
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd)">
      <span style="font-size:12px">${label}</span>
      <div style="display:flex;gap:12px;align-items:center">
        <span style="font-size:11px;color:var(--tx3)">${fmt(vN1)}</span>
        <span style="font-size:11px">→</span>
        <span style="font-size:12px;font-weight:700">${fmt(vN)}</span>
        <span style="font-size:11px;font-weight:700;color:${color}">${up?'+':''}${pct}%</span>
      </div>
    </div>`;
  };

  return`
  <div class="cd" style="margin-bottom:16px">
    <div class="cd-t">📊 Comparaison ${prevYear} vs ${currentExercice}</div>
    ${compare('Chiffre d\'affaires',cN.ca,cN1.ca)}
    ${compare('Depenses',cN.dep,cN1.dep)}
    ${compare('Resultat net',cN.net,cN1.net)}
    ${compare('IS',cN.is,cN1.is)}
    ${compare('Tresorerie',cN.treso,cN1.treso)}
    ${compare('Encours clients',cN.encours,cN1.encours)}
  </div>`;
}

window.handleLogoUpload=(file)=>{
  if(!file)return;

  reader.onload=(e)=>{
    // Resize to max 200px for storage
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const maxW=200;const ratio=Math.min(maxW/img.width,maxW/img.height,1);
      c.width=img.width*ratio;c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      updCompany('logo',c.toDataURL('image/png',0.8));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};

window.handleMultiFiles=async(fileList)=>{
  const files=Array.from(fileList);
  if(files.length===0)return;
  const queue=$('#importQueue');
  const status=$('#importStatus');

  // Show queue
  if(queue)queue.innerHTML=files.map((f,i)=>`
    <div id="fq_${i}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:4px">
      <span style="font-size:16px">${f.type.includes('pdf')?'📄':'📸'}</span>
      <span style="flex:1;font-size:12px;font-weight:600">${f.name}</span>
      <span style="font-size:10px;color:var(--tx3)">${(f.size/1024).toFixed(0)} Ko</span>
      <span id="fqs_${i}" class="tg" style="background:var(--bg4);color:var(--tx3)">En attente</span>
    </div>`).join('');

  let totalTxns=0;let totalReceipts=0;let errors=0;

  for(let i=0;i<files.length;i++){
    const f=files[i];
    const fqs=$('#fqs_'+i);
    if(fqs){fqs.className='tg t-org';fqs.textContent='Analyse…';}

    try{
      if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){
        const count=await processPDF(f);
        if(count===-1){
          if(fqs){fqs.className='tg t-org';fqs.textContent='Déjà importé';}
        }else{
          totalTxns+=count;
          if(fqs){fqs.className='tg t-grn';fqs.textContent=count+' transactions';}
        }
      }else if(f.type.startsWith('image/')){
        const ok=await processImage(f);
        if(ok)totalReceipts++;
        if(fqs){fqs.className='tg t-grn';fqs.textContent=ok?'Ticket détecté':'Texte extrait';}
      }else{
        if(fqs){fqs.className='tg t-org';fqs.textContent='Format non supporté';}
        errors++;
      }
    }catch(e){
      console.error('Erreur fichier',f.name,e);
      if(fqs){fqs.className='tg t-red';fqs.textContent='Erreur';}
      errors++;
    }
  }

  // Summary
  const parts=[];
  if(totalTxns>0)parts.push(`${totalTxns} transactions bancaires`);
  if(totalReceipts>0)parts.push(`${totalReceipts} tickets/factures`);
  if(errors>0)parts.push(`${errors} erreur${errors>1?'s':''}`);

  if(status)status.innerHTML=`<div class="al ${errors>0&&parts.length<=1?'al-w':'al-s'}">
    ${errors>0&&totalTxns===0&&totalReceipts===0?'⚠️':'✅'} <b>${files.length} fichier${files.length>1?'s':''} traité${files.length>1?'s':''}</b> — ${parts.join(' | ')}
  </div>`;

  setTimeout(()=>renderPage(),1200);
};

// Process a single PDF
async function processPDF(file){
  // Load pdf.js if needed
  if(!window.pdfjsLib){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    document.head.appendChild(s);
    await new Promise((ok,ko)=>{s.onload=ok;s.onerror=ko;setTimeout(ko,15000);});
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let allText='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    // Group text items by Y-coordinate to reconstruct proper lines
    const rows={};
    tc.items.forEach(it=>{
      if(!it.str||!it.str.trim())return;
      const y=Math.round(it.transform[5]);
      if(!rows[y])rows[y]=[];
      rows[y].push({x:it.transform[4],str:it.str});
    });
    // Sort rows top-to-bottom (descending Y), items left-to-right
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      allText+=rows[y].sort((a,b)=>a.x-b.x).map(it=>it.str).join(' ')+'\n';
    });
  }

  // Check if this file was already imported (deduplicate by filename)
  const importedFiles=load('importedFiles',[]);
  if(importedFiles.includes(file.name)){
    return -1; // signal: already imported
  }

  const txns=parseBankStatement(allText,file.name);
  txns.forEach(tx=>{tx.cat=autoCat(tx.desc);tx.file=file.name;});

  // Store balance metadata from this statement
  if(txns._meta&&(txns._meta.closeBalance!==undefined||txns._meta.openBalance!==undefined)){
    const balances=load('bankBalances',[]);
    // Remove previous entry for same period if any
    const existingIdx=balances.findIndex(b=>b.periodEnd===txns._meta.periodEnd&&b.iban===txns._meta.iban);
    if(existingIdx>=0)balances.splice(existingIdx,1);
    balances.push(txns._meta);
    balances.sort((a,b)=>(a.periodEnd||'').localeCompare(b.periodEnd||''));
    save('bankBalances',balances);
  }

  if(txns.length>0){
    const existing=load('bankTxns',[]);
    save('bankTxns',[...existing,...txns]);
  }

  // Mark file as imported
  importedFiles.push(file.name);
  save('importedFiles',importedFiles);

  return txns.length;
}

// Process a single image (OCR with Tesseract.js)
async function processImage(file){
  // Load Tesseract.js if needed
  if(!window.Tesseract){
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    document.head.appendChild(s);
    await new Promise((ok,ko)=>{s.onload=ok;s.onerror=ko;setTimeout(ko,20000);});
  }

  // Create thumbnail
  const thumb=await createThumb(file);

  // OCR
  const worker=await Tesseract.createWorker('fra');
  const{data}=await worker.recognize(file);
  await worker.terminate();
  const text=data.text||'';

  // Parse receipt
  const receipt=parseReceipt(text,file.name,thumb);
  if(receipt){
    const existing=load('ocrReceipts',[]);
    existing.push(receipt);
    save('ocrReceipts',existing);
    return true;
  }
  return false;
}

function createThumb(file){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const maxW=120;const ratio=maxW/img.width;
        c.width=maxW;c.height=img.height*ratio;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        resolve(c.toDataURL('image/jpeg',0.5));
      };
      img.onerror=()=>resolve(null);
      img.src=e.target.result;
    };
    reader.onerror=()=>resolve(null);
    reader.readAsDataURL(file);
  });
}

function parseReceipt(text,filename,thumb){
  if(!text||text.trim().length<5)return null;

  // Detect total amount
  let total=0;
  const totalPatterns=[
    /TOTAL\s*(?:TTC|€|EUR)?\s*:?\s*(\d+[.,]\d{2})/i,
    /MONTANT\s*(?:TTC|€|EUR)?\s*:?\s*(\d+[.,]\d{2})/i,
    /A\s*PAYER\s*:?\s*(\d+[.,]\d{2})/i,
    /NET\s*A\s*PAYER\s*:?\s*(\d+[.,]\d{2})/i,
    /CB\s*\*+\s*(\d+[.,]\d{2})/i,
    /(\d+[.,]\d{2})\s*€?\s*$/m,
  ];
  for(const pat of totalPatterns){
    const m=text.match(pat);
    if(m){total=parseFloat(m[1].replace(',','.'));if(total>0)break;}
  }

  // Detect date
  let date=today();
  const dateM=text.match(/(\d{2})[\/.\-](\d{2})[\/.\-](\d{2,4})/);
  if(dateM){
    let y=dateM[3];if(y.length===2)y='20'+y;
    date=`${y}-${dateM[2].padStart(2,'0')}-${dateM[1].padStart(2,'0')}`;
  }

  // Detect vendor (first non-empty line usually)
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  let vendor=lines[0]||'Fournisseur';
  // Clean up vendor name
  vendor=vendor.replace(/^\d+\s*/,'').replace(/[*#=_-]{3,}/g,'').trim();
  if(vendor.length>40)vendor=vendor.substring(0,40)+'…';

  // Detect items
  const items=lines.slice(1,6).filter(l=>!/total|montant|merci|date|heure|cb|carte/i.test(l)).join(', ');

  const cat=autoCat(vendor+' '+text);

  return{
    id:uid(),
    date,
    vendor,
    total:total||0,
    cat,
    file:filename,
    thumb,
    items:items.substring(0,150),
    rawText:text.substring(0,500),
  };
}

function parseBankStatement(text,filename){
  const txns=[];
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const parseAmt=(s)=>parseFloat((s||'').replace(/\s/g,'').replace(',','.'))||0;

  // Extract year from filename (YYYY-MM-...) or header
  let stmtYear=new Date().getFullYear();
  const fnMatch=(filename||'').match(/^(\d{4})-(\d{2})/);
  if(fnMatch)stmtYear=parseInt(fnMatch[1]);
  const headerMatch=text.match(/Du\s+(\d{2})\/(\d{2})\/(\d{4})\s+au\s+(\d{2})\/(\d{2})\/(\d{4})/);
  if(headerMatch)stmtYear=parseInt(headerMatch[6]);

  // Extract balance info from Qonto header
  let meta={};
  if(headerMatch){
    meta.periodStart=headerMatch[3]+'-'+headerMatch[2]+'-'+headerMatch[1];
    meta.periodEnd=headerMatch[6]+'-'+headerMatch[5]+'-'+headerMatch[4];
  }
  // "Solde au DD/MM + XXXX.XX EUR" — opening and closing
  const soldeMatches=[...text.matchAll(/Solde au\s+(\d{2})\/(\d{2})\s+\+\s*([\d\s]+[.,]\d{2})\s*EUR/g)];
  if(soldeMatches.length>=1){meta.openBalance=parseAmt(soldeMatches[0][3]);meta.openDate=stmtYear+'-'+soldeMatches[0][2]+'-'+soldeMatches[0][1];}
  if(soldeMatches.length>=2){meta.closeBalance=parseAmt(soldeMatches[1][3]);meta.closeDate=stmtYear+'-'+soldeMatches[1][2]+'-'+soldeMatches[1][1];}
  // "Entrées + XXXX.XX EUR" / "Sorties - XXXX.XX EUR"
  const entreeM=text.match(/Entrées\s+\+\s*([\d\s]+[.,]\d{2})\s*EUR/);
  if(entreeM)meta.totalIn=parseAmt(entreeM[1]);
  const sortieM=text.match(/Sorties\s+-\s*([\d\s]+[.,]\d{2})\s*EUR/);
  if(sortieM)meta.totalOut=parseAmt(sortieM[1]);
  // IBAN
  const ibanM=text.match(/IBAN:\s*(FR\d{2}\s[\d\s]+\d)/);
  if(ibanM)meta.iban=ibanM[1].replace(/\s+/g,' ');
  // Account name
  const nameM=text.match(/^(FRENCH CENTER|[\w\s]+)\s*$/m);
  if(nameM)meta.accountName=nameM[1].trim();
  meta.filename=filename||'';

  // Detect if Qonto format
  const isQonto=/Qonto|QNTOFRP/.test(text);

  // Qonto: DD/MM DESC +/- AMOUNT EUR
  const qontoReg=/^(\d{2})\/(\d{2})\s+(.+?)\s+([+-])\s*([\d\s]+[.,]\d{2})\s*EUR\s*$/;
  // Qonto without sign (rare, assume debit)
  const qontoReg2=/^(\d{2})\/(\d{2})\s+(.+?)\s+([\d\s]+[.,]\d{2})\s*EUR\s*$/;
  // Skip patterns for Qonto header/footer lines
  const skipReg=/^(Relevés de compte|Du \d|FRENCH CENTER|Solde au|Entrées|Sorties|IBAN|BIC|Date de valeur|Toutes les cartes|Qonto,|Qonto SA|est agréé|Olinda|FRENCH CENTER \(FR|\d+\/\d+$)/;

  // Generic bank patterns (BNP, SG, CM, etc.)
  const genericPatterns=[
    /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s+(-?[\d\s]+[.,]\d{2})\s*$/,
    /(\d{2}\/\d{2}\/\d{2})\s+(.+?)\s+(-?[\d\s]+[.,]\d{2})\s*$/,
    /(\d{2}\.\d{2}\.\d{4})\s+(.+?)\s+(-?[\d\s]+[.,]\d{2})/,
  ];

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(skipReg.test(line))continue;

    // Try Qonto format with sign
    let m=line.match(qontoReg);
    if(m){
      const day=m[1],month=m[2],desc=m[3].trim();
      const sign=m[4]==='-'?-1:1;
      const amount=parseAmt(m[5])*sign;
      const date=stmtYear+'-'+month+'-'+day;
      // Capture continuation line (description detail)
      let detail='';
      if(i+1<lines.length&&!lines[i+1].match(qontoReg)&&!lines[i+1].match(qontoReg2)&&!skipReg.test(lines[i+1])){
        detail=lines[i+1];
        i++; // skip continuation line
      }
      if(amount!==0&&desc.length>1){
        txns.push({date,desc:desc+(detail?' — '+detail:''),amount,id:uid()});
      }
      continue;
    }

    // Try Qonto without explicit sign (debit)
    if(isQonto){
      m=line.match(qontoReg2);
      if(m){
        const day=m[1],month=m[2],desc=m[3].trim();
        const amount=-parseAmt(m[4]);
        const date=stmtYear+'-'+month+'-'+day;
        let detail='';
        if(i+1<lines.length&&!lines[i+1].match(qontoReg)&&!lines[i+1].match(qontoReg2)&&!skipReg.test(lines[i+1])){
          detail=lines[i+1];
          i++;
        }
        if(amount!==0&&desc.length>1){
          txns.push({date,desc:desc+(detail?' — '+detail:''),amount,id:uid()});
        }
        continue;
      }
    }

    // Generic bank patterns
    for(const pat of genericPatterns){
      m=line.match(pat);
      if(m){
        const dateStr=m[1].replace(/\./g,'/');const dp=dateStr.split('/');
        let y=dp[2];if(y.length===2)y='20'+y;
        const date=y+'-'+dp[1].padStart(2,'0')+'-'+dp[0].padStart(2,'0');
        const desc=m[2].trim();const amount=parseAmt(m[3]);
        if(amount!==0&&desc.length>2&&!/^(SOLDE|TOTAL|PAGE|RELEVE|DATE)/i.test(desc)){
          txns.push({date,desc,amount,id:uid()});
        }
        break;
      }
    }
  }
  txns._meta=meta;
  return txns;
}

window.integrateBankTxns=()=>{
  const txns=load('bankTxns',[]);if(txns.length===0)return;
  let added=0;let skipped=0;
  // Deduplication: check existing entries by date+amount+desc similarity
  const existingKeys=new Set();
  factures.forEach(f=>existingKeys.add(f.date+'|'+f.ht+'|'+(f.desc||'').substring(0,20).toLowerCase()));
  depenses.forEach(d=>existingKeys.add(d.date+'|'+d.ht+'|'+(d.desc||'').substring(0,20).toLowerCase()));
  txns.forEach(tx=>{
    const key=tx.date+'|'+Math.abs(tx.amount)+'|'+(tx.desc||'').substring(0,20).toLowerCase();
    if(existingKeys.has(key)){skipped++;return;}
    existingKeys.add(key);
    // Extract client name from desc (part before " — ")
    const client=(tx.desc||'').split(' — ')[0].substring(0,40);
    if(tx.amount>=0){factures.push({id:tx.id||uid(),type:'revenu',date:tx.date,client:client,desc:tx.desc,ht:tx.amount,tva:0,cat:tx.cat||'Autre',paye:true,src:'banque'});}
    else{depenses.push({id:tx.id||uid(),date:tx.date,desc:tx.desc,ht:Math.abs(tx.amount),tva:0,cat:tx.cat||'Autre',src:'banque'});}
    added++;
  });
  persist();save('bankTxns',[]);
  const msg=added+' transactions intégrées !'+(skipped>0?' ('+skipped+' doublons ignorés)':'');
  alert(msg);renderPage();
};

window.integrateReceipts=()=>{
  const receipts=load('ocrReceipts',[]);if(receipts.length===0)return;
  let added=0;
  receipts.forEach(r=>{
    if(r.total>0){
      depenses.push({id:r.id||uid(),date:r.date,desc:r.vendor+(r.items?' — '+r.items.substring(0,60):''),ht:r.total,tva:0,cat:r.cat||'Autre',src:'ocr'});
      added++;
    }
  });
  persist();save('ocrReceipts',[]);
  alert(added+' dépenses ajoutées !');renderPage();
};

window.removeReceipt=(i)=>{

};

window.handleStatutsFiles=(fileList)=>{const f=fileList[0];if(f)handleStatuts(f);};
window.handleStatuts=async(file)=>{
  if(!file)return;
  const status=$('#statutsStatus');
  status.innerHTML=`<div class="al al-i"><span class="spin" style="display:inline-block">⏳</span> Analyse de ${file.name}...</div>`;

  try{
    let text='';

    if(file.type==='application/pdf'||file.name.endsWith('.pdf')){
      // Load pdf.js
      if(!window.pdfjsLib){
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        document.head.appendChild(s);
        await new Promise((ok,ko)=>{s.onload=ok;s.onerror=ko;setTimeout(ko,15000);});
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const tc=await page.getTextContent();
        const rows={};
        tc.items.forEach(it=>{if(!it.str||!it.str.trim())return;const y=Math.round(it.transform[5]);if(!rows[y])rows[y]=[];rows[y].push({x:it.transform[4],str:it.str});});
        Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{text+=rows[y].sort((a,b)=>a.x-b.x).map(it=>it.str).join(' ')+'\n';});
      }
    }else{
      text=await file.text();
    }

    if(text.length<50){status.innerHTML=`<div class="al al-w">⚠️ Pas assez de texte extrait. Vérifie que le PDF n'est pas un scan image.</div>`;return;}

    // Parse statuts
    statutsData=parseStatuts(text);
    statutsData._rawText=text.substring(0,8000);
    statutsData._file=file.name;
    save('statutsData',statutsData);

    const found=Object.keys(statutsData).filter(k=>!k.startsWith('_')&&statutsData[k]).length;
    status.innerHTML=`<div class="al al-s">✅ <b>${file.name}</b> analysé — ${found} informations extraites</div>`;
    renderPage();

  }catch(e){
    status.innerHTML=`<div class="al al-w">❌ Erreur : ${e.message}</div>`;
  }
};

function parseStatuts(text){
  const d={};
  const t=text.replace(/\r/g,'');
  const clean=s=>(s||'').replace(/\s+/g,' ').trim();

  // Dénomination
  let m=t.match(/d[ée]nomination\s+(?:sociale\s+)?est\s*:\s*[«"]?\s*([A-Za-zÀ-ü][A-Za-zÀ-ü\s\-\.&']{1,50})/i);
  if(m)d.denomination=clean(m[1]).replace(/[«»""\n].*/,'').trim();
  if(!d.denomination){m=t.match(/[«"]\s*([A-Za-zÀ-ü][A-Za-zÀ-ü\s\-\.&']{1,40}?)\s*[»"]\s*\n/);if(m)d.denomination=clean(m[1]);}
  if(!d.denomination){m=t.match(/(?:d[ée]nomination|raison\s*sociale)\s*(?:sociale)?\s*[:\.]\s*[«"]?\s*([A-Za-zÀ-ü][A-Za-zÀ-ü\s\-\.&']{2,40})/i);if(m)d.denomination=clean(m[1]).replace(/[«»""]/g,'').replace(/\n.*/,'').trim();}

  // Forme juridique
  if(/soci[ée]t[ée]\s+par\s+actions\s+simplifi[ée]e\s+unipersonnelle|SASU/i.test(t))d.forme='SASU';
  else if(/soci[ée]t[ée]\s+par\s+actions\s+simplifi[ée]e|SAS(?:\s|,|\.|$)/i.test(t))d.forme='SAS';
  else if(/soci[ée]t[ée]\s+[àa]\s+responsabilit[ée]\s+limit[ée]e\s+(?:unipersonnelle|à\s+associ[ée]\s+unique)|EURL/i.test(t))d.forme='EURL';
  else if(/soci[ée]t[ée]\s+[àa]\s+responsabilit[ée]\s+limit[ée]e|SARL/i.test(t))d.forme='SARL';
  else if(/soci[ée]t[ée]\s+civile\s+immobili[èe]re|SCI/i.test(t))d.forme='SCI';
  else if(/soci[ée]t[ée]\s+anonyme|SA(?:\s|,|$)/i.test(t))d.forme='SA';
  else if(/entreprise\s+individuelle|EI/i.test(t))d.forme='EI';

  // Capital (handle "200,00 €" -> 200)
  m=t.match(/capital\s*(?:social)?\s*(?:est\s+fix[ée]\s+[àa]|de|:)\s*([\d\s.,]+)\s*(?:euros?|€)/i);
  if(m){const raw=m[1].replace(/\s/g,'');d.capital=Math.round(parseFloat(raw.replace(',','.'))||0);}
  if(!d.capital){m=t.match(/capital\s*[:\.]\s*([\d\s.,]+)\s*(?:euros?|€)/i);if(m){const raw=m[1].replace(/\s/g,'');d.capital=Math.round(parseFloat(raw.replace(',','.'))||0);}}

  // Siège social
  m=t.match(/si[èe]ge\s*(?:social)?\s*(?:est\s+(?:fix[ée]|[ée]tabli)\s*(?:[àa])?\s*|:)\s*(.{10,120}?)(?:\.\s*\n|Article|ARTICLE|\n\s*\n)/i);
  if(m)d.siege=clean(m[1]).replace(/^[,:\s]+/,'').replace(/\s*[Ii]l\s+(?:pourra|peut).*/,'');
  if(!d.siege){m=t.match(/si[èe]ge\s*(?:social)?\s*(?:est\s+fix[ée])?\s*[:]\s*\n?\s*(.{10,100})/i);if(m)d.siege=clean(m[1]).replace(/\s*[Ii]l\s+(?:pourra|peut).*/,'');}
  // Try extracting postal code + city from siege
  if(d.siege){const cp=d.siege.match(/(\d{5})\s+([A-ZÀ-Üa-zà-ü\s\-]+)/);if(cp)d._cp=cp[1],d._ville=clean(cp[2]);}

  // Objet social
  m=t.match(/objet\s*(?:social)?\s*[:\.]\s*(?:la\s+soci[ée]t[ée]\s+a\s+pour\s+objet\s*:?\s*)?([\s\S]{20,500}?)(?:Article|ARTICLE|\n\s*\n)/i);
  if(m)d.objet=clean(m[1]).substring(0,200);

  // Durée
  m=t.match(/dur[ée]e\s*(?:de\s+la\s+soci[ée]t[ée])?\s*(?:est\s+fix[ée]e?\s*[àa]|:)\s*(\d+)\s*(?:ans?|ann[ée]es?)/i);
  if(m)d.duree=m[1]+' ans';

  // Exercice social — "commence le 1 janvier et finit le 31 décembre"
  m=t.match(/exercice\s*(?:social)?\s*(?:a\s+une\s+dur[ée]e.*?)?(?:commence|d[ée]bute)\s+(?:le\s+)?(\d{1,2}(?:er)?\s*\w+)\s+(?:et\s+)?(?:finit?|se\s+termine)\s+(?:le\s+)?(\d{1,2}\s*\w+)/i);
  if(m){d.exercice=clean(m[1])+' au '+clean(m[2]);}
  if(!d.exercice){m=t.match(/exercice\s*(?:social|comptable)?\s*(?:commence|d[ée]bute|court|:)\s*(?:le\s+)?(\d{1,2}(?:er)?\s*\w+)/i);if(m)d.exercice=clean(m[1]);}
  // Clôture
  m=t.match(/(?:se\s+termine(?:ra)?\s+le|finit?\s+le|cl[oô]tur[ée]?\s+le)\s+(\d{1,2}\s*(?:janvier|f[ée]vrier|mars|avril|mai|juin|juillet|ao[ûu]t|septembre|octobre|novembre|d[ée]cembre))/i);
  if(m)d.cloture=clean(m[1]);
  if(!d.cloture){m=t.match(/(\d{1,2})\s*(janvier|f[ée]vrier|mars|avril|mai|juin|juillet|ao[ûu]t|septembre|octobre|novembre|d[ée]cembre)\s*(?:de\s+chaque\s+ann[ée]e)/i);if(m)d.cloture=m[1]+' '+m[2];}
  if(!d.cloture&&d.exercice){const em=d.exercice.match(/au\s+(.+)/);if(em)d.cloture=em[1];}

  // Dirigeant / Président / Gérant — try "Monsieur X Y" first (founder line)
  m=t.match(/(?:LE\s+SOUSSIGN[ÉE]|ENTRE\s+LES\s+SOUSSIGN[ÉE]S)[\s\S]{0,20}?(?:M(?:onsieur|adame|me)?\.?\s+)([A-ZÀ-Ü][a-zà-ü]+\s+[A-ZÀ-Ü][a-zà-ü\-]+)/i);
  if(m)d.dirigeant=clean(m[1]);
  if(!d.dirigeant){m=t.match(/(?:pr[ée]sident|g[ée]rant|directeur\s+g[ée]n[ée]ral)\s*[:\.]\s*(?:M(?:onsieur|me|adame)?\.?\s+)?([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü\-]+){1,3})/i);if(m)d.dirigeant=clean(m[1]);}
  if(!d.dirigeant){m=t.match(/(?:est\s+nomm[ée]\s+(?:en\s+qualit[ée]\s+de\s+)?(?:pr[ée]sident|g[ée]rant))\s*,?\s*(?:M(?:onsieur|me)?\.?\s+)?([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü\-]+){1,3})/i);if(m)d.dirigeant=clean(m[1]);}

  // Associés
  const assocMatches=[...t.matchAll(/(?:associ[ée]|actionnaire|fondateur)\s*(?:unique)?\s*[:\.]\s*(?:M(?:onsieur|me)?\.?\s+)?([A-ZÀ-Ü][a-zà-ü]+(?:\s+[A-ZÀ-Ü][a-zà-ü\-]+){1,3})/gi)];
  if(assocMatches.length>0)d.associes=assocMatches.map(a=>clean(a[1])).filter((v,i,a)=>a.indexOf(v)===i).join(', ');
  if(!d.associes&&d.dirigeant&&/unipersonnelle|SASU|EURL|actionnaire\s+unique/i.test(t))d.associes=d.dirigeant+' (associé unique)';

  // Régime d'imposition (déduit de la forme juridique)
  if(d.forme){
    if(['SAS','SASU','SA','SARL'].includes(d.forme))d.regimeImposition='IS (Impôt sur les Sociétés) — par défaut pour les '+d.forme;
    else if(d.forme==='EURL')d.regimeImposition='IR (Impôt sur le Revenu) — par défaut pour EURL, option IS possible';
    else if(d.forme==='EI')d.regimeImposition='IR (Impôt sur le Revenu) — BIC ou BNC selon activité';
    else if(d.forme==='SCI')d.regimeImposition='IR (Impôt sur le Revenu) — translucide par défaut, option IS possible';
  }
  // Check if statuts mention option IR/IS
  if(/option\s+(?:pour\s+)?(?:l.)?imp[oô]t\s+sur\s+le\s+revenu|soumise?\s+[àa]\s+l.IR/i.test(t))d.regimeImposition='IR (Impôt sur le Revenu) — option exercée';
  if(/soumise?\s+[àa]\s+l.imp[oô]t\s+sur\s+les\s+soci[ée]t[ée]s|assujettie?\s+[àa]\s+l.IS/i.test(t))d.regimeImposition='IS (Impôt sur les Sociétés)';

  // Régime TVA déduit
  if(/franchise\s+(?:en\s+)?base\s+(?:de\s+)?TVA|exon[ée]r[ée]e?\s+de\s+TVA|art(?:icle)?\.?\s*293\s*B/i.test(t))d.regimeTVA='Franchise en base (art. 293 B CGI)';
  if(/art(?:icle)?\.?\s*261[\s\-]4[\s\-]4|exon[ée]ration\s+(?:de\s+)?TVA\s+(?:sur\s+)?(?:les\s+)?formations?/i.test(t))d.regimeTVA='Exonéré TVA (art. 261-4-4° CGI — formation)';

  // Commissaire aux comptes
  if(/commissaire\s+aux\s+comptes.*?nomm[ée]/i.test(t))d.cac='Oui (CAC nommé)';
  else if(/commissaire\s+aux\s+comptes/i.test(t))d.cac='Non obligatoire (sous les seuils)';

  // Réserve légale
  m=t.match(/r[ée]serve\s+l[ée]gale.*?(\d+)\s*(?:pour\s+cent|%)/i);
  if(m)d.reserveLegale=m[1]+'%';

  // SIREN / RCS
  m=t.match(/(?:SIREN|RCS)\s*(?:de\s+\w+)?\s*[:n°]?\s*(\d[\d\s]{7,15})/i);
  if(m)d.siren=clean(m[1]).replace(/\s/g,'');
  if(!d.siren){m=t.match(/immatricul[ée]e?\s+(?:au\s+)?(?:RCS|registre)\s+(?:de\s+)?(\w+)\s+(?:sous\s+le\s+(?:num[ée]ro|n°)\s+)?(\d[\d\s]{7,15})/i);if(m)d.siren=clean(m[2]).replace(/\s/g,'');}

  // N° déclaration d'activité (organismes de formation)
  m=t.match(/(?:d[ée]claration\s+d.activit[ée]|NDA|num[ée]ro\s+d.activit[ée])\s*[:n°]?\s*(\d[\d\s]{8,16})/i);
  if(m)d.nda=clean(m[1]).replace(/\s/g,'');

  // Date immatriculation
  m=t.match(/immatricul[ée]e?\s+(?:le\s+)?(\d{1,2}[\s/\.\-]\d{1,2}[\s/\.\-]\d{2,4})/i);
  if(m)d.dateImmat=clean(m[1]);
  if(!d.dateImmat){m=t.match(/(?:constitu[ée]e?\s+le|cr[ée][ée]e?\s+le|en\s+date\s+du)\s+(\d{1,2}[\s/\.\-]\d{1,2}[\s/\.\-]\d{2,4})/i);if(m)d.dateImmat=clean(m[1]);}

  // Répartition du capital
  const repartMatches=[...t.matchAll(/(\d+)\s*(?:actions?|parts?\s*sociales?)\s*(?:de\s+\w+\s+)?(?:d.une?\s+valeur\s+(?:nominale\s+)?de\s+)?([\d.,]+)\s*(?:euros?|€)/gi)];
  if(repartMatches.length>0)d.repartition=repartMatches.map(r=>`${r[1]} parts × ${r[2]} €`).join(', ');
  if(!d.repartition){m=t.match(/divis[ée]\s+en\s+(\d+)\s+(?:actions?|parts?)\s+(?:(?:sociales?\s+)?(?:d.une?\s+)?(?:valeur\s+)?(?:nominale\s+)?(?:de\s+)?)?([\d.,]+)\s*(?:euros?|€)/i);if(m)d.repartition=`${m[1]} parts × ${m[2]} €`;}

  return d;
}

window.applyStatuts=()=>{
  if(!statutsData)return;
  const d=statutsData;
  const changes=[];
  const upd=(field,val,label,oldVal)=>{
    if(!val)return;
    const prev=oldVal!==undefined?oldVal:company[field];
    if(val===prev)return;
    const old=prev||'(vide)';
    company[field]=val;
    changes.push({label,old:String(old),new:String(val)});
  };

  upd('nom',d.denomination,'Dénomination sociale');
  if(d.forme){
    const typeMap={SAS:'SAS',SASU:'SASU',SARL:'SARL',EURL:'EURL',SA:'SA',EI:'EI',SCI:'SARL'};
    const newType=typeMap[d.forme];
    if(newType)upd('type',newType,'Forme juridique',company.type);
  }
  upd('capital',d.capital,'Capital social');
  upd('adresse',d.siege,'Siège social');
  upd('siren',d.siren,'SIREN');
  upd('dirigeant',d.dirigeant,'Dirigeant');
  upd('objetSocial',d.objet,'Objet social');
  upd('dateCloture',d.cloture,'Date de clôture');
  upd('nda',d.nda,'N° déclaration d\'activité');
  upd('duree',d.duree,'Durée');
  upd('exerciceSocial',d.exercice,'Exercice social');

  // Régime d'imposition
  if(d.regimeImposition){
    const isIR=/^IR/.test(d.regimeImposition);
    const newRegime=isIR?'ir':'is';
    if(newRegime!==company.regime){
      changes.push({label:'Régime d\'imposition',old:company.regime==='ir'?'IR':'IS',new:isIR?'IR':'IS'});
      company.regime=newRegime;
    }
  }

  // Régime TVA
  if(d.regimeTVA){
    let newTVA='reel_simplifie';
    if(/franchise/i.test(d.regimeTVA))newTVA='franchise';
    else if(/exon[ée]r/i.test(d.regimeTVA))newTVA='exoneree';
    if(newTVA!==company.regimeTVA){
      changes.push({label:'Régime TVA',old:company.regimeTVA||'(vide)',new:d.regimeTVA});
      company.regimeTVA=newTVA;
    }
  }

  // Date d'immatriculation
  if(d.dateImmat){
    const p=d.dateImmat.replace(/\s/g,'').split(/[\/\.\-]/);
    if(p.length===3){
      let y=p[2];if(y.length===2)y='20'+y;
      const dateStr=y+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
      upd('dateCreation',dateStr,'Date de création');
    }
  }

  persist();

  if(changes.length>0){
    // Show changes in a modal
    const m=document.createElement('div');m.className='modal-bg';m.onclick=e=>{if(e.target===m){m.remove();render();}};
    m.innerHTML=`<div class="modal fade">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3>✅ ${changes.length} paramètre${changes.length>1?'s':''} mis à jour</h3>
        <button class="bt bt-s sm" onclick="this.closest('.modal-bg').remove();render();">OK</button>
      </div>
      <div style="display:grid;gap:6px">
      ${changes.map(c=>`
        <div style="padding:10px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--grn)">
          <div style="font-size:11px;font-weight:700;color:var(--grn);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${c.label}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:12px;color:var(--tx3);text-decoration:line-through;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.old}</span>
            <span style="color:var(--grn)">→</span>
            <span style="font-size:13px;font-weight:700;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.new}</span>
          </div>
        </div>`).join('')}
      </div>
      <div class="al al-s" style="margin-top:14px"><span>🎉</span><span>Tous les paramètres de ta société sont maintenant à jour. Ton dashboard, tes calculs d'IS, de TVA et tes déclarations utilisent ces nouvelles valeurs.</span></div>
    </div>`;
    document.body.appendChild(m);
  }else{
    alert('✅ Tout est déjà à jour — aucun changement nécessaire.');
  }
};

function buildSuggestions(){

  if(c.treso<0)sug.push('Ma trésorerie est négative, que faire ?');
  // Optimisations chiffrées
  if(c.ben>0)sug.push('Combien je peux économiser sur mon IS de '+fmt(c.is)+' ?');
  sug.push('Salaire vs dividendes : calcule le mix optimal');
  sug.push('Quelles dépenses je peux déduire que j\'oublie ?');
  // Contextuelles
  if(company?.rem===0&&c.ca>5000)sug.push('Je ne me verse rien, c\'est grave ?');
  if(t.tns)sug.push('Comment réduire mes cotisations URSSAF ?');
  if(!t.tns)sug.push('CESU, tickets resto, PEE : combien j\'économise ?');
  if(c.ben>42500)sug.push('Mon bénéfice dépasse 42 500€, stratégie ?');
  sug.push('Préparer ma clôture : checklist complète');
  sug.push('Comment payer 0€ de CFE ?');
  sug.push('Est-ce que je dois créer une holding ?');
  sug.push('IK + frais repas : combien je récupère ?');
  return sug.slice(0,8);
}

function formatAI(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n\d+\. /g,(m)=>'\n'+m.trim()+' ')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg4);padding:1px 4px;border-radius:3px;font-size:11px">$1</code>')
    .replace(/\n/g,'<br>');
}

window.askAI=async(question)=>{
  if(!question||!question.trim())return;
  question=question.trim();
  const input=$('#chatIn');if(input)input.value='';
  const sug=$('#chatSug');if(sug)sug.remove();

  // Add user message
  aiMessages.push({role:'user',content:question});
  save('aiMessages',aiMessages);

  // Show user message + loading
  const msgs=$('#chatMsgs');
  if(msgs){
    msgs.innerHTML+=`<div class="chat-msg user">${question}</div>`;
    msgs.innerHTML+=`<div class="chat-msg ai" id="aiLoading"><span class="spin" style="display:inline-block">⏳</span> Analyse en cours...</div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }

  try{
    const context=getCompanyContext();
    const apiMessages=aiMessages.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content}));
    let answer='';

    // Try server-side agent first (has tools), fallback to direct API
    const serverUrl=window.location.origin+'/api/agent';
    let useServer=true;
    try{
      const res=await fetch(serverUrl,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:apiMessages,context})
      });
      if(res.ok){const data=await res.json();answer=data.answer||'Pas de reponse.';}
      else{useServer=false;}
    }catch{useServer=false;}

    // Fallback: direct API call with user's key
    if(!useServer){
      if(!aiKey)throw new Error('Serveur indisponible et aucune cle API configuree.');
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2048,system:AI_SYSTEM+'\n\n'+context,messages:apiMessages})
      });
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||'Erreur API ('+res.status+')');}
      const data=await res.json();
      answer=data.content?.[0]?.text||'Pas de reponse.';
    }

    aiMessages.push({role:'assistant',content:answer});
    save('aiMessages',aiMessages);

    const loading=$('#aiLoading');
    if(loading)loading.outerHTML=`<div class="chat-msg ai">${formatAI(answer)}</div>`;
    if(msgs)msgs.scrollTop=msgs.scrollHeight;

  }catch(e){
    const loading=$('#aiLoading');
    if(loading)loading.outerHTML=`<div class="chat-msg ai" style="color:var(--red)">❌ ${e.message}<br><span style="font-size:10px;color:var(--tx3)">Vérifie ta clé API dans les paramètres.</span></div>`;
    // Remove the failed assistant message attempt
    if(aiMessages[aiMessages.length-1]?.role==='user'){}// keep user msg
  }
};

  if(month===11)tips.push({type:'pur',text:'Décembre : la CFE (Cotisation Foncière des Entreprises) est due le 15/12. Vérifie ton avis sur impots.gouv.fr.'});

  // IS acomptes
  if(month===2)tips.push({type:'pur',text:"Mars : 1er acompte d'IS dû le 15/03. Montant = 25% de l'IS du dernier exercice."});
  if(month===5)tips.push({type:'pur',text:"Juin : 2ème acompte d'IS dû le 15/06."});

  // TVA CA12
  if(company?.regimeTVA==='reel_simplifie'&&month===4)tips.push({type:'pur',text:'Mai : déclaration annuelle de TVA CA12 à déposer (régime réel simplifié).'});

  // Low treasury
  if(c.treso<0)tips.push({type:'red',text:`Trésorerie comptable négative (${fmt(c.treso)}). Risque de cessation de paiement — contacte ton banquier.`});

  // URSSAF for TNS
  if(t.tns&&month%3===0)tips.push({type:'blu',text:'Rappel : en tant que TNS, tes cotisations URSSAF sont dues chaque trimestre (ou mensuellement si tu as opté).'});

  return tips.slice(0,4);
}

// Re-render with new nav
render();
</script>
